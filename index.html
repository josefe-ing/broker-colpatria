const Badge = ({children,color=C.wine,bg,small}) => <span style={{display:"inline-flex",alignItems:"center",padding:small?"2px 8px":"4px 12px",borderRadius:20,fontSize:small?10:11,fontWeight:700,background:bg||`${color}15`,color,letterSpacing:0.3}}>{children}</span>;

const Btn = ({children,onClick,variant="primary",disabled,full,small,style={}}) => {
  const b = {padding:small?"8px 16px":"14px 24px",borderRadius:14,fontWeight:700,fontSize:small?13:15,cursor:disabled?"not-allowed":"pointer",border:"none",transition:"all 0.2s",fontFamily:"inherit",opacity:disabled?0.4:1,width:full?"100%":"auto",letterSpacing:-0.2};
  const v = {primary:{...b,background:C.wine,color:"#fff",...style},outline:{...b,background:"transparent",color:C.wine,border:`2px solid ${C.wine}`,...style},ghost:{...b,background:C.wineLight,color:C.wine,...style},success:{...b,background:C.wineDark,color:"#fff",...style},whatsapp:{...b,background:"#25D366",color:"#fff",...style}};
  return <button onClick={onClick} disabled={disabled} style={v[variant]}>{children}</button>;
};

const QRGrid = ({seed=1}) => (
  <div style={{width:140,height:140,margin:"0 auto",background:"#fff",borderRadius:12,display:"grid",gridTemplateColumns:"repeat(10,1fr)",gridTemplateRows:"repeat(10,1fr)",gap:1.5,padding:8,border:`1px solid ${C.border}`}}>
    {Array.from({length:100}).map((_,i)=>{
      const on = ((i*7+seed*13)%3===0)||((i*11+seed*5)%5===0)||((i<20&&i%2===0))||(i>80&&i%3===0)||(i%10<2)||(i%10>7);

function AcademyScreen() {
  const [lesson,setLesson]=useState(null);const[qs,setQs]=useState({q:0,sel:null,score:0,done:false});
  const quiz=[{q:"Un prospecto dice: 'No tengo para la cuota inicial.' ¿Qué respondes?",opts:["'Esto no es para ti'","'Con Mi Casa Ya puedes recibir subsidio que cubre parte de la cuota'","'Pregúntale a alguien'","'Eso es del banco'"],ans:1},
    {q:"¿Cuál es el momento ideal para registrar un lead?",opts:["Cuando firmó documentos","Cuando muestra interés genuino en vivienda propia","Solo si tiene todo el dinero","Después de la visita"],ans:1},
    {q:"Tu prospecto no contesta. ¿Qué haces?",opts:["Lo borras","Esperas","Le envías un WhatsApp amigable y breve","Lo reportas como perdido"],ans:2}];

  const paths=[
    {id:1,title:"Fundamentos VIS",icon:"🏠",color:C.wine,progress:4,total:4,lessons:[{t:"¿Qué es vivienda VIS?",d:true},{t:"Subsidios y beneficios",d:true},{t:"Crédito hipotecario básico",d:true},{t:"El proceso de compra",d:true}]},
    {id:2,title:"Tu rol como Broker",icon:"🎯",color:C.red,progress:2,total:4,lessons:[{t:"Cómo identificar prospectos",d:true},{t:"El pitch perfecto",d:true},{t:"Manejo de objeciones",d:false},{t:"Registrar leads",d:false}]},
    {id:3,title:"Proyecto: Villa del Sol",icon:"🌇",color:"#9B2C4E",progress:3,total:3,lessons:[{t:"Ubicación y entorno",d:true},{t:"Tipos de apto y precios",d:true},{t:"Financiación",d:true}]},
    {id:4,title:"Proyecto: Parques de Bolívar",icon:"🏘️",color:"#7A1F3D",progress:1,total:3,lessons:[{t:"Ubicación y entorno",d:true},{t:"Tipos de apto y precios",d:false},{t:"Financiación",d:false}]},
  ];

  if(lesson!==null){
    if(qs.done){const p=qs.score>=2;return <div style={{padding:"20px 24px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",textAlign:"center"}}><div style={{fontSize:72,marginBottom:16}}>{p?"🎉":"💪"}</div><h3 style={{fontSize:22,fontWeight:800,color:C.text,margin:"0 0 4px"}}>{p?"¡Lección completada!":"Casi lo logras"}</h3><p style={{fontSize:14,color:C.textSec,marginBottom:8}}>{qs.score}/{quiz.length} correctas</p>{p&&<div style={{background:C.wineLight,borderRadius:12,padding:"10px 20px",marginBottom:24}}>⭐ <span style={{fontSize:15,fontWeight:800,color:C.wine}}>+40 XP</span></div>}<Btn onClick={()=>{setLesson(null);setQs({q:0,sel:null,score:0,done:false});}} full>{p?"Continuar →":"Reintentar"}</Btn></div>;}
    const q=quiz[qs.q];
    return <div style={{padding:"20px 24px",display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><span onClick={()=>{setLesson(null);setQs({q:0,sel:null,score:0,done:false});}} style={{fontSize:14,color:C.textSec,cursor:"pointer"}}>✕</span><Badge color={C.wine}>❤️ ❤️ ❤️</Badge></div>
      <div style={{height:6,borderRadius:3,background:C.border,marginBottom:24,overflow:"hidden"}}><div style={{width:`${((qs.q+1)/quiz.length)*100}%`,height:"100%",background:C.wine,borderRadius:3,transition:"width 0.4s"}} /></div>
      <div style={{background:C.wineLight,borderRadius:16,padding:20,marginBottom:20}}><p style={{fontSize:16,fontWeight:700,color:C.text,margin:0,lineHeight:1.5}}>{q.q}</p></div>
      <div style={{flex:1,display:"flex",flexDirection:"column",gap:10}}>{q.opts.map((o,i)=><div key={i} onClick={()=>setQs({...qs,sel:i})} style={{padding:"14px 16px",borderRadius:14,cursor:"pointer",transition:"all 0.15s",background:qs.sel===i?C.wineLight:C.card,border:`2px solid ${qs.sel===i?C.wine:C.border}`,color:C.text,fontSize:14,fontWeight:qs.sel===i?600:400}}><span style={{display:"inline-flex",width:24,height:24,borderRadius:12,background:qs.sel===i?C.wine:C.border,color:qs.sel===i?"#fff":C.textTer,alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,marginRight:10}}>{String.fromCharCode(65+i)}</span>{o}</div>)}</div>
      <div style={{paddingTop:16,paddingBottom:8}}><Btn onClick={()=>{const ns=qs.sel===q.ans?qs.score+1:qs.score;if(qs.q<quiz.length-1)setQs({q:qs.q+1,sel:null,score:ns,done:false});else setQs({...qs,score:ns,done:true});}} disabled={qs.sel===null} full>{qs.q<quiz.length-1?"Verificar →":"Finalizar"}</Btn></div>
    </div>;
  }

  return <div style={{padding:"0 20px 24px"}}>
    <div style={{padding:"16px 0 20px"}}><h2 style={{fontSize:22,fontWeight:800,color:C.text,margin:"0 0 4px",letterSpacing:-0.5}}>Academy</h2><p style={{fontSize:14,color:C.textSec,margin:0}}>Completa tu formación</p></div>
    <div style={{background:`linear-gradient(135deg,${C.wine},${C.red})`,borderRadius:20,padding:20,marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{color:"rgba(255,255,255,0.8)",fontSize:12,fontWeight:600}}>Progreso total</div><div style={{color:"#fff",fontSize:28,fontWeight:800,marginTop:4}}>320 XP</div><div style={{color:"rgba(255,255,255,0.7)",fontSize:12,marginTop:4}}>🔥 Racha: 5 días</div></div><div style={{width:64,height:64,borderRadius:32,border:"4px solid rgba(255,255,255,0.3)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:18,fontWeight:800}}>10/14</div></div>
    {paths.map(p=><div key={p.id} style={{background:C.card,borderRadius:20,marginBottom:14,border:`1px solid ${C.borderLight}`,overflow:"hidden"}}>
      <div style={{padding:"16px 18px 12px",display:"flex",alignItems:"center",gap:14}}>
        <div style={{width:48,height:48,borderRadius:16,background:`${p.color}12`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{p.icon}</div>
        <div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:15,fontWeight:700,color:C.text}}>{p.title}</span>{p.progress===p.total&&<span>✅</span>}</div><div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}><div style={{flex:1,height:6,borderRadius:3,background:C.border,overflow:"hidden"}}><div style={{width:`${(p.progress/p.total)*100}%`,height:"100%",borderRadius:3,background:p.color}} /></div><span style={{fontSize:11,color:C.textSec,fontWeight:600}}>{p.progress}/{p.total}</span></div></div>
      </div>
      <div style={{padding:"0 18px 14px"}}>{p.lessons.map((l,i)=><div key={i} onClick={()=>!l.d&&setLesson(i)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderTop:`1px solid ${C.borderLight}`,cursor:l.d?"default":"pointer"}}>
        <div style={{width:28,height:28,borderRadius:14,background:l.d?C.wineLight:C.cardAlt,border:`2px solid ${l.d?C.wine:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:l.d?C.wine:C.textTer,flexShrink:0}}>{l.d?"✓":i+1}</div>
        <span style={{fontSize:13,color:l.d?C.textSec:C.text,fontWeight:l.d?400:500,textDecoration:l.d?"line-through":"none"}}>{l.t}</span>
        {!l.d&&<span style={{marginLeft:"auto",fontSize:12,color:p.color,fontWeight:700}}>+40 XP</span>}
      </div>)}</div>
    </div>)}
  </div>;
}

    <div style={{marginBottom:20}}>

      {PROJECTS.filter(p=>p.selected).map(p=><div key={p.id} onClick={()=>setDetail(p.id)} style={{background:C.card,borderRadius:16,padding:16,marginBottom:10,border:`1px solid ${C.borderLight}`,cursor:"pointer",display:"flex",alignItems:"center",gap:14}}>
        <div style={{width:52,height:52,borderRadius:16,background:`${p.color}12`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,flexShrink:0}}>{p.img}</div>

          <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:15,fontWeight:700,color:C.text}}>{p.name}</span>{p.certified&&<span style={{fontSize:12}}>✅</span>}</div>
          <div style={{fontSize:12,color:C.textSec,marginTop:2}}>{p.location} · {p.price}</div>
          <div style={{display:"flex",gap:4,marginTop:6}}>
            <Badge small color={p.color}>{p.type}</Badge>
            <Badge small color={C.wine}>Certificado</Badge>
          </div>
        </div>
        <span style={{fontSize:16,color:C.textTer}}>→</span>
      </div>)}
    </div>

    {/* Available projects */}
    <div>
      <h3 style={{fontSize:14,fontWeight:700,color:C.text,margin:"0 0 12px"}}>📋 Otros proyectos disponibles</h3>
      {PROJECTS.filter(p=>!p.selected).map(p=><div key={p.id} onClick={()=>setDetail(p.id)} style={{background:C.card,borderRadius:16,padding:16,marginBottom:10,border:`1px solid ${C.borderLight}`,cursor:"pointer",display:"flex",alignItems:"center",gap:14,opacity:0.75}}>
        <div style={{width:52,height:52,borderRadius:16,background:`${p.color}12`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,flexShrink:0}}>{p.img}</div>
        <div style={{flex:1}}>
          <div style={{fontSize:15,fontWeight:700,color:C.text}}>{p.name}</div>
          <div style={{fontSize:12,color:C.textSec,marginTop:2}}>{p.location} · {p.price}</div>
          <Badge small color={C.textSec} style={{marginTop:6}}>🔒 Requiere certificación</Badge>
        </div>
        <span style={{fontSize:16,color:C.textTer}}>→</span>
      </div>)}
      <p style={{fontSize:12,color:C.textTer,textAlign:"center",marginTop:8}}>Para activar más proyectos, completa tu formación en Academy y libera un espacio (máx. 2).</p>
    </div>
  </div>;
}

          <Badge color={cfg.color} bg={cfg.bg}>{cfg.label}</Badge>
        </div>
        <div style={{display:"flex",gap:8,marginTop:12}}><Btn variant="whatsapp" small style={{fontSize:12,padding:"8px 14px",borderRadius:10}}>📲 WhatsApp</Btn><Btn variant="ghost" small style={{fontSize:12,padding:"8px 14px",borderRadius:10}}>📞 Llamar</Btn></div>
      </div>
      <div style={{background:C.card,borderRadius:20,padding:20,border:`1px solid ${C.borderLight}`,marginBottom:16}}>
        <h4 style={{fontSize:14,fontWeight:700,color:C.text,margin:"0 0 16px"}}>Progreso</h4>
        {pipeline.slice(0,5).map((st,i)=>{const done=i<=stepIdx;const cur=i===stepIdx;return <div key={st} style={{display:"flex",alignItems:"flex-start",gap:12}}><div style={{display:"flex",flexDirection:"column",alignItems:"center"}}><div style={{width:24,height:24,borderRadius:12,background:done?C.wine:C.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:done?"#fff":C.textTer,fontWeight:700,flexShrink:0,border:cur?`3px solid ${C.wine}`:"none"}}>{done&&i<stepIdx?"✓":i+1}</div>{i<4&&<div style={{width:2,height:24,background:done?C.wine:C.border}} />}</div><div style={{paddingBottom:8}}><span style={{fontSize:13,fontWeight:cur?700:400,color:cur?C.text:C.textSec}}>{STATUS_MAP[st].label}</span></div></div>;})}
      </div>
      {sug&&<div style={{background:C.card,borderRadius:20,padding:20,border:`2px solid ${C.wine}22`,marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><span style={{fontSize:18}}>💡</span><h4 style={{fontSize:14,fontWeight:700,color:C.wine,margin:0}}>Próximo paso sugerido</h4></div>
        <p style={{fontSize:13,color:C.textSec,lineHeight:1.5,margin:"0 0 14px"}}>{lead.name} {sug.msg}</p>
        <div style={{background:C.cardAlt,borderRadius:14,padding:14,marginBottom:14,borderLeft:`3px solid ${C.wine}`}}>
          <p style={{fontSize:11,color:C.textTer,margin:"0 0 4px",fontWeight:600}}>MENSAJE SUGERIDO</p>
          <p style={{fontSize:13,color:C.text,margin:0,lineHeight:1.5}}>"{sug.wa.replace("{name}",lead.name.split(" ")[0]).replace("{broker}","Broker").replace("{project}",lead.project).replace("{sub}","Mi Casa Ya").replace("{date}",lead.nextVisit||"pronto")}"</p>
        </div>
        <div style={{display:"flex",gap:8}}><Btn variant="whatsapp" small full style={{borderRadius:12,fontSize:13}}>📲 Enviar por WhatsApp</Btn><Btn variant="ghost" small style={{borderRadius:12,fontSize:13}}>✏️ Editar</Btn></div>
      </div>}
      <div style={{background:C.wineLight,borderRadius:16,padding:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:12,color:C.wine,fontWeight:600}}>Comisión estimada</div><div style={{fontSize:20,fontWeight:800,color:C.wine}}>{fmt(lead.comision)}</div></div><span style={{fontSize:28}}>💰</span></div>
    </div>;
  }

  if(showNew) return <div style={{padding:"0 20px 24px"}}>
    <div style={{padding:"16px 0",display:"flex",alignItems:"center",gap:8}}><span onClick={()=>setShowNew(false)} style={{fontSize:20,cursor:"pointer"}}>←</span><h3 style={{fontSize:18,fontWeight:700,color:C.text,margin:0}}>Registrar lead</h3></div>
    <div style={{background:C.card,borderRadius:20,padding:24,border:`1px solid ${C.borderLight}`}}>
      <Input label="Nombre" value={nf.name} onChange={v=>setNf({...nf,name:v})} placeholder="Nombre completo" />
      <Input label="Celular" value={nf.phone} onChange={v=>setNf({...nf,phone:v})} placeholder="300 123 4567" type="tel" />
      <div style={{marginBottom:16}}><label style={{display:"block",color:C.textSec,fontSize:12,fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:0.8}}>Proyecto</label>
        {PROJECTS.filter(p=>p.selected).map(p=><div key={p.id} onClick={()=>setNf({...nf,project:p.name})} style={{padding:"12px 16px",borderRadius:12,border:`2px solid ${nf.project===p.name?C.wine:C.border}`,background:nf.project===p.name?C.wineLight:C.card,cursor:"pointer",display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
          <span style={{fontSize:20}}>{p.img}</span><div><div style={{fontSize:14,fontWeight:600,color:C.text}}>{p.name}</div><div style={{fontSize:12,color:C.textSec}}>{p.location}</div></div>
        </div>)}
      </div>
      <Btn onClick={()=>setShowNew(false)} disabled={!nf.name||!nf.phone||!nf.project} full>Registrar lead →</Btn>
    </div>
  </div>;

  return <div style={{padding:"0 20px 24px"}}>
    <div style={{padding:"16px 0 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div><h2 style={{fontSize:22,fontWeight:800,color:C.text,margin:0,letterSpacing:-0.5}}>Mis Leads</h2><p style={{fontSize:13,color:C.textSec,margin:"2px 0 0"}}>{leads.length} prospectos</p></div>
      <Btn onClick={()=>setShowNew(true)} small style={{borderRadius:12}}>+ Nuevo</Btn>
    </div>
    <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
      {[["Nuevos",leads.filter(l=>l.status==="registrado").length,C.textSec],["Contactados",leads.filter(l=>l.status==="contactado").length,C.wine],["Visitas",leads.filter(l=>l.status==="visita_agendada").length,"#B84363"],["Crédito",leads.filter(l=>l.status==="credito_aprobado").length,C.wineDark]].map(([l,n,c])=><div key={l} style={{background:C.card,borderRadius:12,padding:"8px 14px",border:`1px solid ${C.borderLight}`,textAlign:"center",minWidth:75}}><div style={{fontSize:18,fontWeight:800,color:c}}>{n}</div><div style={{fontSize:10,color:C.textTer}}>{l}</div></div>)}
    </div>
    {leads.map((lead,i)=>{const cfg=STATUS_MAP[lead.status];const sug=SUGGESTIONS[lead.status];
      return <div key={i} onClick={()=>setSel(i)} style={{background:C.card,borderRadius:16,padding:16,marginBottom:10,border:`1px solid ${C.borderLight}`,cursor:"pointer"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:40,height:40,borderRadius:20,background:`${cfg.color}12`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,color:cfg.color}}>{lead.name.charAt(0)}</div>
            <div><div style={{fontSize:14,fontWeight:700,color:C.text}}>{lead.name}</div><div style={{fontSize:12,color:C.textSec}}>{lead.project} · {lead.date}</div></div>
          </div>
          <Badge small color={cfg.color} bg={cfg.bg}>{cfg.label}</Badge>
        </div>
        {(sug||lead.auto)&&<div style={{marginTop:10,padding:"8px 12px",borderRadius:10,background:C.cardAlt,display:"flex",alignItems:"center",gap:6}}>
          {sug&&<><span style={{fontSize:12}}>{sug.icon}</span><span style={{fontSize:11,color:C.textSec}}>{sug.title}</span></>}
          {lead.auto&&<Badge small color={C.wine} style={{marginLeft:"auto"}}>📱 Auto</Badge>}
          <span style={{marginLeft:lead.auto?"0":"auto",fontSize:12}}>→</span>
        </div>}
      </div>;
    })}
  </div>;
}

// ─── PERFIL ───
function PerfilScreen() {
  const [showComisiones,setShowComisiones]=useState(false);
  if(showComisiones) return <div style={{padding:"0 20px 24px"}}>
    <div style={{padding:"16px 0",display:"flex",alignItems:"center",gap:8}}><span onClick={()=>setShowComisiones(false)} style={{fontSize:20,cursor:"pointer"}}>←</span><h3 style={{fontSize:18,fontWeight:700,color:C.text,margin:0}}>Comisiones</h3></div>
    <div style={{background:`linear-gradient(135deg,${C.wine},${C.red})`,borderRadius:20,padding:24,marginBottom:20}}>
      <div style={{color:"rgba(255,255,255,0.7)",fontSize:12,fontWeight:600}}>Total estimado</div>
      <div style={{color:"#fff",fontSize:32,fontWeight:800,marginTop:4}}>{fmt(1550000)}</div>
      <div style={{display:"flex",gap:16,marginTop:16}}>
        {[["En retención",fmt(750000)],["Pendientes",fmt(800000)],["Pagadas",fmt(0)]].map(([l,v])=><div key={l}><div style={{color:"rgba(255,255,255,0.6)",fontSize:11}}>{l}</div><div style={{color:"#fff",fontSize:16,fontWeight:700}}>{v}</div></div>)}
      </div>
    </div>
    {[{n:"Ana Ruiz",p:"Parques de Bolívar",a:750000,st:"retention",d:45,t:120},{n:"María González",p:"Villa del Sol",a:800000,st:"pending",d:0,t:120}].map((d,i)=><div key={i} style={{background:C.card,borderRadius:16,padding:18,marginBottom:12,border:`1px solid ${C.borderLight}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}><div><div style={{fontSize:15,fontWeight:700,color:C.text}}>{d.n}</div><div style={{fontSize:12,color:C.textSec,marginTop:2}}>{d.p}</div></div><Badge small color={d.st==="retention"?"#B84363":C.wine}>{d.st==="retention"?"En retención":"En proceso"}</Badge></div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><span style={{fontSize:20,fontWeight:800,color:C.wine}}>{fmt(d.a)}</span>{d.st==="retention"&&<span style={{fontSize:12,color:C.textSec}}>{d.d}/{d.t} días</span>}</div>
      {d.st==="retention"&&<div style={{height:6,borderRadius:3,background:C.border,overflow:"hidden"}}><div style={{width:`${(d.d/d.t)*100}%`,height:"100%",borderRadius:3,background:C.wine}} /></div>}
    </div>)}
    <div style={{background:C.wineLight,borderRadius:16,padding:16,marginTop:8}}><div style={{fontSize:13,fontWeight:700,color:C.wine,marginBottom:4}}>ℹ️ ¿Cómo funciona?</div><p style={{fontSize:12,color:C.text,lineHeight:1.5,margin:0}}>La comisión se genera al aprobarse el crédito. Se aplica retención de 120 días para garantizar la venta.</p></div>
  </div>;

  return <div style={{padding:"0 20px 24px"}}>
    <div style={{padding:"16px 0 20px",textAlign:"center"}}>
      <div style={{width:72,height:72,borderRadius:36,background:`linear-gradient(135deg,${C.wine},${C.red})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,color:"#fff",fontWeight:800,margin:"0 auto 12px"}}>B</div>
      <h3 style={{fontSize:20,fontWeight:800,color:C.text,margin:"0 0 2px"}}>Broker Demo</h3>
      <p style={{fontSize:13,color:C.textSec,margin:0}}>Universidad de los Andes · 6to semestre</p>
      <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:12}}><Badge color={C.wineDark}>✅ KYC Verificado</Badge><Badge color={C.wine}>🎓 En formación</Badge></div>
    </div>

    <div onClick={()=>setShowComisiones(true)} style={{background:`linear-gradient(135deg,${C.wine},${C.red})`,borderRadius:16,padding:18,marginBottom:16,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div><div style={{color:"rgba(255,255,255,0.7)",fontSize:12}}>Mis comisiones</div><div style={{color:"#fff",fontSize:22,fontWeight:800}}>{fmt(1550000)}</div></div>
      <span style={{color:"#fff",fontSize:20}}>→</span>
    </div>

    <div style={{background:C.card,borderRadius:16,padding:16,marginBottom:12,border:`1px solid ${C.borderLight}`}}>
      <h4 style={{fontSize:14,fontWeight:700,color:C.text,margin:"0 0 12px"}}>Estadísticas</h4>
      {[["🏆 Ranking","#7 de 124"],["⭐ XP","320"],["🔥 Racha","5 días"],["👥 Leads","4"],["🎓 Lecciones","10/14"],["🏗️ Proyectos activos","2/2"]].map(([l,v],i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderTop:i>0?`1px solid ${C.borderLight}`:"none"}}><span style={{fontSize:13,color:C.textSec}}>{l}</span><span style={{fontSize:13,fontWeight:700,color:C.text}}>{v}</span></div>)}
    </div>
    <Btn variant="outline" full style={{marginTop:8}}>Cerrar sesión</Btn>
  </div>;
}

// ─── MAIN ───
function App() {
  const [screen,setScreen]=useState("welcome");
  const [tab,setTab]=useState("home");
  const [leads,setLeads]=useState(MOCK_LEADS);
  const [isMobile,setIsMobile]=useState(false);
  useEffect(()=>{const check=()=>setIsMobile(window.innerWidth<500);check();window.addEventListener("resize",check);return()=>window.removeEventListener("resize",check);},[]);

  const onb = {welcome:<OnboardingWelcome onNext={()=>setScreen("register")} />,register:<OnboardingRegister onNext={()=>setScreen("kyc")} />,kyc:<OnboardingKYC onNext={()=>setScreen("success")} />,success:<OnboardingSuccess onNext={()=>setScreen("app")} />};
  const tabs = {home:<HomeScreen setTab={setTab} leads={leads} />,academy:<AcademyScreen />,proyectos:<ProyectosScreen leads={leads} setLeads={setLeads} setTab={setTab} />,leads:<LeadsScreen leads={leads} setTab={setTab} />,perfil:<PerfilScreen />};
  const isOnb=screen!=="app";

  const shell = (
    <>
      {!isMobile&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:160,height:34,background:"#1a1a2e",borderRadius:"0 0 20px 20px",zIndex:50}} />}
      {!isMobile&&<div style={{height:50,display:"flex",alignItems:"flex-end",justifyContent:"center",paddingBottom:4,fontSize:13,fontWeight:600,color:C.text,flexShrink:0}}>9:41</div>}
      <div style={{flex:1,overflowY:"auto",overflowX:"hidden",WebkitOverflowScrolling:"touch",paddingTop:isMobile?"env(safe-area-inset-top, 16px)":0}}>{isOnb?onb[screen]:tabs[tab]}</div>
      {!isOnb&&<div style={{height:isMobile?80:72,background:C.card,borderTop:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-around",flexShrink:0,paddingBottom:isMobile?"env(safe-area-inset-bottom, 16px)":"8px"}}>
        <NavItem icon="🏠" label="Home" active={tab==="home"} onClick={()=>setTab("home")} />
        <NavItem icon="📚" label="Academy" active={tab==="academy"} onClick={()=>setTab("academy")} />
        <NavItem icon="🏗️" label="Proyectos" active={tab==="proyectos"} onClick={()=>setTab("proyectos")} />
        <NavItem icon="👥" label="Leads" active={tab==="leads"} onClick={()=>setTab("leads")} badge={leads.filter(l=>l.status==="registrado").length||null} />
        <NavItem icon="👤" label="Perfil" active={tab==="perfil"} onClick={()=>setTab("perfil")} />
      </div>}
    </>
  );

  if(isMobile) return (
    <div style={{height:"100vh",width:"100vw",background:C.bg,fontFamily:"'DM Sans','Nunito',-apple-system,sans-serif",display:"flex",flexDirection:"column",position:"fixed",top:0,left:0}}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
      <style>{`html,body{overflow:hidden;height:100%;margin:0;padding:0;background:${C.bg}}*{-webkit-overflow-scrolling:touch}`}</style>
      {shell}
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#F0E8EC",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans','Nunito',-apple-system,sans-serif",padding:"20px 0"}}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
      <div style={{width:390,height:844,borderRadius:44,background:C.bg,position:"relative",overflow:"hidden",boxShadow:`0 0 0 8px #1a1a2e,${C.shadowLg}`,display:"flex",flexDirection:"column"}}>
        {shell}
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
